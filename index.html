<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保険治療料金表｜にしむら整骨院</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  background: #f9f9f9;
}

/* ヘッダー */
header {
  background: #000;
  color: #fff;
  text-align: center;
  padding: 20px;
}

/* セクション */
.section {
  padding: 30px 20px;
  text-align: center;
}

.section h2 {
  color: #ff9900;
  margin-bottom: 20px;
}

/* 平均料金 */
.average {
  background: #fff3cd;
  padding: 15px;
  border-radius: 10px;
  font-weight: bold;
  margin-bottom: 25px;
  display: inline-block;
}

/* 料金ボックス */
.price-box {
  background: #fff;
  margin: 15px auto;
  padding: 20px;
  border-radius: 12px;
  max-width: 400px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.price-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
}

.price-item {
  font-size: 18px;
  margin: 8px 0;
}

/* 強調 */
.highlight {
  color: #ff6600;
  font-weight: bold;
  font-size: 20px;
}

/* 注意書き */
.note {
  font-size: 14px;
  color: #666;
  margin-top: 20px;
}

/* フッター */
footer {
  background: #222;
  color: #aaa;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
<h1>にしむら整骨院</h1>
<p>保険治療料金表</p>
</header>

<section class="section">
<h2>料金のご案内</h2>

<div class="average">
ほとんどの方が<br>
<span style="color:#ff6600; font-size:20px;">200円〜500円程度</span><br>
で通院されています
</div>

<div class="price-box">
<div class="price-title">1割ご負担</div>
<div class="price-item">初診料 <span class="highlight">390円</span></div>
<div class="price-item">3回目以降 <span class="highlight">160〜200円</span></div>
</div>

<div class="price-box">
<div class="price-title">2割ご負担</div>
<div class="price-item">初診料 <span class="highlight">790円</span></div>
<div class="price-item">3回目以降 <span class="highlight">320〜500円</span></div>
</div>

<div class="price-box">
<div class="price-title">3割ご負担</div>
<div class="price-item">初診料 <span class="highlight">1,180円</span></div>
<div class="price-item">3回目以降 <span class="highlight">480〜700円</span></div>
</div>

<p class="note">
※症状や施術内容により金額が前後する場合があります
</p>

</section>

<footer>
<p>© にしむら整骨院</p>
</footer>

</body>
</html>
