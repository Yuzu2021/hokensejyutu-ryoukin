<!DOCTYPE html>

<head>

<title>保険治療料金表｜にしむら整骨院</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  background: #fff8f5;
  color: #333;
}

/* ヘッダー */
header {
  position: relative;
  text-align: center;
  padding: 20px 0;
  background: #000;
  color: #fff;
}

header h1 {
  margin: 0;
  font-size: 20px;
}

header h1 a {
  color: #fff;
  text-decoration: none;
}

header p {
  margin: 5px 0 0;
  font-size: 16px;
  color: #ffcc99;
}

.insta-header {
  width: 28px;
  position: absolute;
  right: 15px;
  top: 20px;
}

/* セクション */
.section {
  padding: 30px 20px;
  text-align: center;
}

.section h2 {
  color: #ff6600;
  margin-bottom: 20px;
  font-size: 22px;
}

/* 平均料金 */
.average {
  background: #fff3cd;
  padding: 15px;
  border-radius: 10px;
  font-weight: bold;
  margin-bottom: 25px;
  display: inline-block;
  line-height: 1.5;
}

.average span {
  color: #ff6600;
  font-size: 20px;
  font-weight: bold;
}

/* 料金ボックス */
.price-box {
  background: #fff;
  margin: 15px auto;
  padding: 20px;
  border-radius: 12px;
  max-width: 400px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.price-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #ff6600;
}

.price-item {
  font-size: 18px;
  margin: 8px 0;
}

.highlight {
  color: #ff6600;
  font-weight: bold;
}

/* 注意書き */
.note {
  font-size: 14px;
  color: #666;
  margin-top: 20px;
}

/* フッター */
footer {
  background: #222;
  color: #aaa;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>
    <a href="https://yuzu2021.github.io/lp-seikotsu-0401page/#faq">

  </h1>
  <a href="https://www.instagram.com/gym_seikotuin">

    <div class="price-item">初診料 <span class="highlight">1,180円</span></div>
    <div class="price-item">3回目以降 <span class="highlight">480〜700円</span></div>
  </div>

  <p class="note">※症状や施術内容により金額が前後する場合があります</p>

<footer>
  <p>© にしむら整骨院</p>
